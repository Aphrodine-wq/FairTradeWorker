# AEON Verification Config — FairTradeWorker
# Two-sided construction marketplace: QuickBooks payments, escrow, auth,
# contractor/homeowner flows, bidding, chat, AI estimates
# PROFILE: cybersecurity — all 22 security engines + construction domain
profile: cybersecurity

engines:
  # Construction domain
  symbolic_exec: true
  numeric_safety: true
  money_math: true
  construction_domain: true
  framework_rules: true
  # Core analysis
  taint_analysis: true
  information_flow: true
  concurrency_check: true
  cross_file: true
  error_handling: true
  # Security Tier 1 (all)
  api_security: true
  auth_access_control: true
  cache_poisoning: true
  container_security: true
  crypto_misuse: true
  data_exposure: true
  email_security: true
  file_upload: true
  http_smuggling: true
  injection_advanced: true
  input_validation: true
  insecure_randomness: true
  oauth_oidc: true
  # Security Tier 2 (all)
  business_logic: true
  dependency_audit: true
  prototype_pollution: true
  race_condition_security: true
  secret_detection: true
  security_misconfig: true
  session_jwt: true
  supply_chain: true
  ssrf_advanced: true

severity: warning

include:
  - "src/**/*.ts"
  - "src/**/*.tsx"

exclude:
  - "node_modules/**"
  - ".next/**"
  - "dist/**"
  - "out/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "src/shared/ui/**"

custom_taint_sources:
  - "searchParams"
  - "params"
  - "cookies"
  - "formData"
  - "request.json"
  - "request.body"
  - "supabase.auth.getUser"
  - "req.nextUrl.searchParams"
  - "req.headers"
  - "WebSocket.onmessage"
  - "channel.on"

custom_taint_sinks:
  # Database (Supabase)
  - "supabase.from"
  - "supabase.rpc"
  # Payments (QuickBooks Online)
  - "quickbooks"
  - "qbo.createInvoice"
  - "qbo.createPayment"
  - "qbo.createEstimate"
  # Voice AI (ElevenLabs)
  - "elevenlabs"
  # Navigation
  - "redirect"
  - "dangerouslySetInnerHTML"
  # External APIs
  - "fetch"
  # Realtime
  - "channel.push"
  - "PubSub.broadcast"

parallel: true
baseline: .aeon-baseline.json
