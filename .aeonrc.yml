# AEON Verification Config — FairTradeWorker
# Two-sided marketplace: escrow payments, auth, contractor/homeowner flows
# Backend not built yet — these sinks are pre-configured for when integrations land
profile: construction

engines:
  symbolic_exec: true
  taint_analysis: true
  information_flow: true
  numeric_safety: true
  money_math: true
  concurrency_check: true
  framework_rules: true
  construction_domain: true

severity: warning

include:
  - "src/**/*.ts"
  - "src/**/*.tsx"

exclude:
  - "node_modules/**"
  - ".next/**"
  - "dist/**"
  - "out/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "src/shared/ui/**"

custom_taint_sources:
  - "searchParams"
  - "params"
  - "cookies"
  - "formData"
  - "request.json"
  - "request.body"
  - "supabase.auth.getUser"
  - "req.nextUrl.searchParams"
  - "req.headers"

custom_taint_sinks:
  # Database (planned: Supabase)
  - "supabase.from"
  - "supabase.rpc"
  # Payments (planned: Stripe Connect escrow)
  - "stripe.customers.create"
  - "stripe.checkout.sessions.create"
  - "stripe.paymentIntents.create"
  - "stripe.transfers.create"
  - "stripe.webhooks.constructEvent"
  # Voice AI (planned: ElevenLabs)
  - "elevenlabs"
  # Navigation
  - "redirect"
  - "dangerouslySetInnerHTML"
  # External APIs
  - "fetch"

parallel: true
